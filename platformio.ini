[env:m5stack-atoms3]
platform = espressif32@6.11.0
board = m5stack-atoms3
framework = arduino
upload_speed = 115200
monitor_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = partitions_ota.csv
upload_protocol = esptool
extra_scripts = post:merge_bin.py



board_build.arduino.usb_vid = 0xDEAD
board_build.arduino.usb_pid = 0xBEEF

build_flags =
    -DBOARD_TYPE=M5STACK_ATOMS3
    -DBOARD_M5STACK_ATOMS3=1
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCONFIG_USB_ENABLED=1
    -DARDUINO_USB_DFU_ON_BOOT=0
    -DCORE_DEBUG_LEVEL=0

build_src_filter = +<*> -<cardputer/*>

lib_deps =
    ArduinoJson
    fastled/FastLED@^3.6.0
    links2004/WebSockets@^2.7.3


[env:m5stack-cardputer]
platform = espressif32@6.11.0
board = m5stack-stamps3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = partitions_ota.csv
upload_protocol = esptool
extra_scripts = post:merge_bin.py

board_build.arduino.usb_vid = 0xDEAD
board_build.arduino.usb_pid = 0xBEEF

build_unflags = -DARDUINO_USB_MODE

build_flags =
    -DBOARD_TYPE=M5STACK_CARDPUTER
    -DBOARD_M5STACK_CARDPUTER=1
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_DISPLAY=1

build_src_filter = +<*>

lib_deps =
    ArduinoJson
    fastled/FastLED@^3.6.0
    m5stack/M5Cardputer@^1.0.0
    ricmoo/QRCode@^0.0.1
    WiFiClientSecure
    links2004/WebSockets@^2.7.3

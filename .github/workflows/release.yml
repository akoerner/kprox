name: Release

"on":
  push:
    branches: [master]

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    env:
      PLATFORMIO_CORE_DIR: ${{ github.workspace }}/.pio
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            node_modules
          key: pio-${{ hashFiles('platformio.ini', 'package.json') }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y nodejs npm
          pip install platformio

      - name: Build web assets
        run: |
          npm install html-minifier clean-css terser fs-extra mkdirp
          node build.js

      - name: Build AtomS3
        run: |
          pio run -e m5stack-atoms3
          pio run -t buildfs -e m5stack-atoms3

      - name: Build Cardputer
        run: |
          pio run -e m5stack-cardputer
          pio run -t buildfs -e m5stack-cardputer

      - name: Debug
        run: find . -name "*_full.bin" | sort

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            kprox_m5stack-atoms3_full.bin
            kprox_m5stack-stamps3_full.bin

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: cd android && make build

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/output/kprox-discovery.apk

  release:
    needs: [build-firmware, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Debug
        run: find . -name "*.bin" -o -name "*.apk" | sort

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT::7}"
          SUBJECT=$(git log -1 --pretty=%s)
          TAG="release-${SHORT}"

          gh release create "$TAG" \
            --title "${SHORT}: ${SUBJECT}" \
            --notes 'Commit: ${{ github.sha }}' \
            kprox_m5stack-atoms3_full.bin \
            kprox_m5stack-stamps3_full.bin \
            kprox-discovery.apk

build-firmware:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            node_modules
          key: pio-${{ hashFiles('platformio.ini', 'package.json') }}

      - name: Install dependencies
        run: |
          sudo apt-get install -y nodejs npm
          pip install platformio

      - name: Build web assets
        run: |
          npm install html-minifier clean-css terser fs-extra mkdirp
          node build.js

      - name: Build AtomS3
        run: |
          pio run -e m5stack-atoms3 --project-dir ${{ github.workspace }}
          pio run -t buildfs -e m5stack-atoms3 --project-dir ${{ github.workspace }}

      - name: Build Cardputer
        run: |
          pio run -e m5stack-cardputer --project-dir ${{ github.workspace }}
          pio run -t buildfs -e m5stack-cardputer --project-dir ${{ github.workspace }}

      - name: Merge AtomS3 bins
        run: |
          ESPTOOL=$(find ~/.platformio -name "esptool.py" | head -1)
          python3 "$ESPTOOL" --chip esp32s3 merge_bin \
            -o kprox_m5stack-atoms3_full.bin \
            --flash_mode dio --flash_freq 80m --flash_size 8MB \
            0x0000   .pio/build/m5stack-atoms3/bootloader.bin \
            0x8000   .pio/build/m5stack-atoms3/partitions.bin \
            0x10000  .pio/build/m5stack-atoms3/firmware.bin \
            0x610000 .pio/build/m5stack-atoms3/spiffs.bin

      - name: Merge Cardputer bins
        run: |
          ESPTOOL=$(find ~/.platformio -name "esptool.py" | head -1)
          python3 "$ESPTOOL" --chip esp32s3 merge_bin \
            -o kprox_m5stack-cardputer_full.bin \
            --flash_mode dio --flash_freq 80m --flash_size 8MB \
            0x0000   .pio/build/m5stack-cardputer/bootloader.bin \
            0x8000   .pio/build/m5stack-cardputer/partitions.bin \
            0x10000  .pio/build/m5stack-cardputer/firmware.bin \
            0x610000 .pio/build/m5stack-cardputer/spiffs.bin

      - name: Debug
        run: find . -name "*_full.bin" | sort

      - uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: |
            kprox_m5stack-atoms3_full.bin
            kprox_m5stack-cardputer_full.bin

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build APK
        run: cd android && make build

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: android/output/kprox-discovery.apk

  release:
    needs: [build-firmware, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true

      - name: Debug
        run: find . -name "*.bin" -o -name "*.apk" | sort

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT="${{ github.sha }}"
          SHORT="${SHORT::7}"
          SUBJECT=$(git log -1 --pretty=%s)
          TAG="release-${SHORT}"

          gh release create "$TAG" \
            --title "${SHORT}: ${SUBJECT}" \
            --notes 'Commit: ${{ github.sha }}' \
            kprox_m5stack-atoms3_full.bin \
            kprox_m5stack-cardputer_full.bin \
            kprox-discovery.apk
